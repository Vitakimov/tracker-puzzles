<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр трекера — бизнес-пазлы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:        #f7f6f3;
    --surface:   #ffffff;
    --border:    #e4e1d9;
    --border-md: #ccc9c0;
    --text-1:    #1a1915;
    --text-2:    #5c5a53;
    --text-3:    #9b9890;
    --accent:    #2d6a4f;
    --accent-bg: #eaf3ee;
    --warn:      #92400e;
    --warn-bg:   #fef3c7;
    --danger:    #991b1b;
    --danger-bg: #fef2f2;
    --success:   #14532d;
    --success-bg:#f0fdf4;
    --success-br:#bbf7d0;
    --fail-br:   #fecaca;
    --new:       #1e3a5f;
    --new-bg:    #eff6ff;
    --new-br:    #bfdbfe;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Onest', sans-serif;
    color: var(--text-1);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  #app {
    max-width: 660px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 10px;
  }
  .brand {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.01em;
  }
  .brand span { color: var(--accent); }

  /* ── Auth screen ── */
  #t-auth {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  #t-auth.show { display: flex; }
  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
  }
  .auth-brand { font-size: 15px; font-weight: 600; margin-bottom: 1.5rem; }
  .auth-brand span { color: var(--accent); }
  .auth-h { font-size: 19px; font-weight: 600; margin-bottom: .375rem; }
  .auth-p { font-size: 13px; color: var(--text-2); margin-bottom: 1.5rem; }
  .auth-f { margin-bottom: .875rem; }
  .auth-f label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; }
  .auth-f input {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text-1); outline: none; transition: border-color .15s;
  }
  .auth-f input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; padding: 11px; margin-top: .5rem; font-family: inherit; font-size: 14px; font-weight: 500;
    border: none; border-radius: var(--radius-sm); background: var(--accent); color: #fff;
    cursor: pointer; transition: opacity .15s;
  }
  .auth-btn:hover { opacity: .9; }
  .auth-btn:disabled { opacity: .5; cursor: default; }
  .auth-toggle { margin-top: 1rem; font-size: 13px; color: var(--text-2); text-align: center; }
  .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .auth-msg { font-size: 12px; margin-top: .75rem; min-height: 16px; }
  .auth-msg.err { color: var(--danger); }
  .auth-msg.ok { color: var(--accent); }
  .user-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
  .user-badge b { color: var(--text-1); font-weight: 500; }
  .logout-link { font-size: 12px; color: var(--text-3); cursor: pointer; text-decoration: underline; }
  .logout-link:hover { color: var(--danger); }

  /* ── Filter chips ── */
  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .chip {
    font-size: 12px;
    font-family: inherit;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--border-md); color: var(--text-1); }
  .chip.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 500;
  }
  .chip.new-chip { border-color: var(--new-br); color: var(--new); }
  .chip.new-chip.active { background: var(--new-bg); }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-2);
    text-align: center;
  }
  .stat b { color: var(--text-1); font-weight: 600; }

  /* ── Progress ── */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: .75rem;
    transition: border-color .2s;
  }
  .card.is-new { border-color: var(--new-br); }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .tag-theme { background: var(--warn-bg); color: var(--warn); }
  .tag-easy  { background: var(--success-bg); color: var(--success); }
  .tag-mid   { background: var(--warn-bg); color: var(--warn); }
  .tag-hard  { background: var(--danger-bg); color: var(--danger); }
  .tag-new   { background: var(--new-bg); color: var(--new); }
  .counter   { font-size: 12px; color: var(--text-3); margin-left: auto; }

  .case-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .case-body {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.7;
  }
  .hl {
    background: var(--warn-bg);
    color: var(--warn);
    border-radius: 4px;
    padding: 1px 4px;
    font-weight: 500;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 1.25rem 0 8px;
  }

  /* ── Options ── */
  .opt {
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-1);
    cursor: pointer;
    margin-bottom: 6px;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--border-md);
    background: var(--bg);
  }
  .opt.correct {
    border-color: var(--success-br) !important;
    background: var(--success-bg) !important;
    color: var(--success) !important;
  }
  .opt.wrong {
    border-color: var(--fail-br) !important;
    background: var(--danger-bg) !important;
    color: var(--danger) !important;
  }
  .opt-l { font-weight: 600; min-width: 20px; flex-shrink: 0; }

  /* ── Result ── */
  .result {
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    font-size: 14px;
    line-height: 1.7;
    display: none;
    margin-top: .75rem;
  }
  .result.show { display: block; }
  .result.ok {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-br);
  }
  .result.fail {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid var(--fail-br);
  }
  .result-title { font-weight: 600; margin-bottom: 5px; }

  /* ── Hint ── */
  .hint-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-2);
    border-left: 3px solid var(--border-md);
    margin-top: 10px;
    display: none;
    line-height: 1.6;
  }
  .hint-box.show { display: block; }

  /* ── Bottom bar ── */
  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .75rem;
  }
  .hint-btn {
    font-size: 13px;
    font-family: inherit;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: color .15s;
  }
  .hint-btn:hover { color: var(--text-2); }
  .next-btn {
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-1);
    display: none;
    align-items: center;
    gap: 6px;
    transition: all .15s;
  }
  .next-btn.show { display: flex; }
  .next-btn:hover { background: var(--bg); border-color: var(--text-3); }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 3rem;
    font-size: 14px;
    color: var(--text-3);
  }

  @media (max-width: 480px) {
    body { padding: 1rem .75rem; }
    .card { padding: 1.25rem; }
    .stats .stat { padding: 8px 6px; font-size: 12px; }
  }
</style>
</head>

<!-- Экран входа / регистрации -->
<div id="t-auth">
  <div class="auth-card">

</div>

    <button class="chip new-chip" onclick="setFilter('new',this)">✦ Новые (6)</button>

  <div class="stats">

  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div id="puzzle-area"></div>
</div>

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Нормализует кейс к единому виду (из RAW или из Supabase)
function normalizeCase(p) {
  // Supabase-строка: topic/difficulty/description/answer/wrong_options/is_new
  // RAW-строка:      theme/diff/body/correct/wrong/isNew
  const theme = p.theme ?? p.topic;
  const diff = p.diff ?? p.difficulty;
  const body = p.body ?? p.description ?? '';
  const correct = p.correct ?? p.answer;
  const wrong = p.wrong ?? p.wrong_options ?? [];
  const isNew = p.isNew ?? p.is_new ?? false;
  return {
    id: p.id ?? null,          // настоящий UUID из Supabase (для записи попыток)
    theme, diff, isNew, body, correct,
    title: p.title,
    hint: p.hint ?? '',
    explanation: p.explanation ?? '',
    wrong: Array.isArray(wrong) ? wrong : [],
  };
}

function buildPuzzles(source) {
  return source.map(raw => {
    const p = normalizeCase(raw);
    const opts = shuffle([
      { t: p.correct, c: true },
      ...p.wrong.map(t => ({ t, c: false }))
    ]);
    return { ...p, opts };
  });
}

let PUZZLES = [];
let filter = 'all', current = 0, answered = false;
let streak = 0, rightCnt = 0, wrongCnt = 0;
let hintUsed = false;

// Загрузка кейсов: сначала из Supabase, при ошибке/пустоте — из RAW
async function loadPuzzles() {
  try {
    const { data, error } = await db
      .from('cases')
      .select('*')
      .eq('status', 'active')
      .order('created_at', { ascending: true });
    if (error) throw error;
    if (data && data.length) {
      PUZZLES = buildPuzzles(data);
      renderPuzzle();
      return;
    }
  } catch (e) {
    console.warn('Не удалось загрузить кейсы из Supabase, использую резервные:', e.message);
  }
  PUZZLES = buildPuzzles(RAW);
  renderPuzzle();
}

function getFiltered() {
  if (filter === 'all') return PUZZLES;
  if (filter === 'new') return PUZZLES.filter(p => p.isNew);
  return PUZZLES.filter(p => p.theme === filter);
}

function setFilter(f, el) {
  filter = f;
  current = 0;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderPuzzle();
}

function renderPuzzle() {
  const list = getFiltered();
  const area = document.getElementById('puzzle-area');
  if (!list.length) {
    area.innerHTML = '<div class="empty">Нет кейсов в этой категории</div>';
    return;
  }
  const idx = current % list.length;
  const p = list[idx];
  answered = false;
  hintUsed = false;
  document.getElementById('progress').style.width = ((idx + 1) / list.length * 100) + '%';
  const diffClass = p.diff === 'Лёгкий' ? 'tag-easy' : p.diff === 'Средний' ? 'tag-mid' : 'tag-hard';

  area.innerHTML = `
    <div class="card${p.isNew ? ' is-new' : ''}">
      <div class="meta">
        <span class="tag tag-theme">${p.theme}</span>
        <span class="tag ${diffClass}">${p.diff}</span>
        ${p.isNew ? '<span class="tag tag-new">✦ Новый</span>' : ''}
        <span class="counter">${idx + 1} / ${list.length}</span>
      </div>
      <div class="case-title">${p.title}</div>
      <div class="case-body">${p.body}</div>
      <div class="section-label">Твой ход как трекера</div>
      ${p.opts.map((o, i) => `
        <button class="opt" onclick="pickOpt(this,${o.c})" id="o${i}">
          <span class="opt-l">${'ABCD'[i]}.</span><span>${o.t}</span>
        </button>`).join('')}
      <div class="hint-box" id="hint-box">${p.hint}</div>
      <div class="result" id="result"></div>
    </div>
    <div class="bottombar">
      <button class="hint-btn" onclick="showHint()">💡 Подсказка</button>
      <button class="next-btn" id="next-btn" onclick="nextPuzzle()">Следующий →</button>
    </div>`;
}

function pickOpt(el, correct) {
  if (answered) return;
  answered = true;
  const list = getFiltered();
  const p = list[current % list.length];
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.disabled = true;
    if (p.opts[i].c) b.classList.add('correct');
  });
  if (correct) { el.classList.add('correct'); streak++; rightCnt++; }
  else { el.classList.add('wrong'); streak = 0; wrongCnt++; }
  const res = document.getElementById('result');
  res.className = 'result show ' + (correct ? 'ok' : 'fail');
  res.innerHTML = `<div class="result-title">${correct ? '✓ Верно' : '✗ Не совсем'}</div>${p.explanation}`;
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('s-right').textContent = rightCnt;
  document.getElementById('s-wrong').textContent = wrongCnt;

  // Запись попытки в Supabase
  recordAttempt(p, correct);
}

async function recordAttempt(p, correct) {
  // result: 'correct' | 'hint' (верно, но с подсказкой) | 'wrong'
  const result = correct ? (hintUsed ? 'hint' : 'correct') : 'wrong';
  const row = { user_id: USER_ID, result };
  if (p.id) row.case_id = p.id;  // настоящий UUID есть только у кейсов из Supabase
  try {
    await db.from('attempts').insert(row);
    // обновим/создадим запись пользователя (рейтинг = сумма верных, +1 балл за верный)
    if (correct) {
      await db.from('users').upsert(
        { id: USER_ID, name: USER_NAME || USER_ID, rating: rightCnt, streak },
        { onConflict: 'id' }
      );
    }
  } catch (e) {
    console.warn('Не удалось записать попытку:', e.message);
  }
}

function showHint() {
  document.getElementById('hint-box').classList.add('show');
  hintUsed = true;
}

function nextPuzzle() {
  const list = getFiltered();
  current++;
  if (current >= list.length) current = 0;
  renderPuzzle();
}

// ─── Авторизация пользователя ───────────────────────────────
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  const isSignup = authMode === 'signup';
  document.getElementById('auth-h').textContent = isSignup ? 'Регистрация' : 'Вход';
  document.getElementById('auth-p').textContent = isSignup
    ? 'Создайте аккаунт, чтобы сохранять прогресс'
    : 'Войдите, чтобы сохранять прогресс на любом устройстве';
  document.getElementById('t-auth-btn').textContent = isSignup ? 'Зарегистрироваться' : 'Войти';
  document.getElementById('name-field').style.display = isSignup ? 'block' : 'none';
  document.getElementById('t-auth-toggle').innerHTML = isSignup
    ? 'Уже есть аккаунт? <a onclick="toggleAuthMode()">Войти</a>'
    : 'Нет аккаунта? <a onclick="toggleAuthMode()">Зарегистрироваться</a>';
  document.getElementById('t-auth-msg').textContent = '';
  document.getElementById('t-password').setAttribute('autocomplete', isSignup ? 'new-password' : 'current-password');
}

async function doAuth() {
  const email = document.getElementById('t-email').value.trim();
  const password = document.getElementById('t-password').value;
  const name = document.getElementById('t-name').value.trim();
  const msg = document.getElementById('t-auth-msg');
  const btn = document.getElementById('t-auth-btn');

  if (!email || !password) { msg.className = 'auth-msg err'; msg.textContent = 'Заполните email и пароль'; return; }

  btn.disabled = true;
  btn.textContent = '...';
  msg.textContent = '';

  if (authMode === 'signup') {
    const { data, error } = await db.auth.signUp({
      email, password,
      options: { data: { full_name: name || email.split('@')[0] } }
    });
    btn.disabled = false;
    btn.textContent = 'Зарегистрироваться';
    if (error) { msg.className = 'auth-msg err'; msg.textContent = translateAuthError(error.message); return; }
    if (data.user && !data.session) {
      // включено подтверждение email
      msg.className = 'auth-msg ok';
      msg.textContent = 'Проверьте почту — отправили письмо для подтверждения.';
      return;
    }
    onAuthSuccess(data.user);
  } else {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    btn.textContent = 'Войти';
    if (error) { msg.className = 'auth-msg err'; msg.textContent = translateAuthError(error.message); return; }
    onAuthSuccess(data.user);
  }
}

function translateAuthError(m) {
  if (m === 'Invalid login credentials') return 'Неверный email или пароль';
  if (m.includes('already registered')) return 'Такой email уже зарегистрирован';
  if (m.includes('at least 6')) return 'Пароль должен быть не короче 6 символов';
  if (m.includes('valid email')) return 'Введите корректный email';
  return m;
}

function onAuthSuccess(user) {
  USER_ID = user.id;
  USER_NAME = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Трекер';
  document.getElementById('ub-name').textContent = USER_NAME;
  document.getElementById('t-auth').classList.remove('show');
  document.getElementById('app').style.display = 'block';
  // создаём/обновляем запись пользователя в таблице users
  db.from('users').upsert({ id: USER_ID, name: USER_NAME }, { onConflict: 'id' });
  loadPuzzles();
}

async function trainerLogout() {
  await db.auth.signOut();
  USER_ID = null; USER_NAME = null;
  streak = 0; rightCnt = 0; wrongCnt = 0;
  document.getElementById('app').style.display = 'none';
  document.getElementById('t-auth').classList.add('show');
  document.getElementById('t-password').value = '';
}

// Enter отправляет форму
['t-email','t-password','t-name'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
});

// При загрузке: проверяем активную сессию
async function initTrainer() {
  const { data } = await db.auth.getSession();
  if (data.session) {
    onAuthSuccess(data.session.user);
  } else {
    document.getElementById('t-auth').classList.add('show');
  }
}

initTrainer();
